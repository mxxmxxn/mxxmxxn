name: Generar animaciones de contribuciones

on:
  schedule:
    - cron: "0 */12 * * *"   # cada 12 horas
  workflow_dispatch:          # ejecución manual
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pac-Man -> dist/
      - name: Generar SVGs de Pac-Man
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          games: 'pacman'

      # Calendario 3D isometrico -> profile-3d-contrib/
      - name: Generar calendario 3D isometrico
        uses: yoshi389111/github-profile-3d-contrib@v0.9.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      # Mover los SVGs 3D al mismo dist/
      - name: Mover SVGs 3D a dist
        run: |
          mkdir -p dist
          cp profile-3d-contrib/*.svg dist/

      # Publicar todo dist/ en la rama output (limpia los SVGs viejos de la serpiente)
      - name: Publicar en la rama output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
