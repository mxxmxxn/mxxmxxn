<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 330" width="100%" role="img" aria-label="Mimoun Baltit Khadiri - Full Stack Developer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"></stop>
      <stop offset="0.55" stop-color="#161b22"></stop>
      <stop offset="1" stop-color="#21262d"></stop>
    </linearGradient>
    <radialGradient id="aura" cx="50%" cy="46%" r="62%">
      <stop offset="0" stop-color="#30363d" stop-opacity="0.55"></stop>
      <stop offset="0.6" stop-color="#21262d" stop-opacity="0.15"></stop>
      <stop offset="1" stop-color="#0d1117" stop-opacity="0"></stop>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F3D27A"></stop>
      <stop offset="0.5" stop-color="#E0B84C"></stop>
      <stop offset="1" stop-color="#A9781A"></stop>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"></stop>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.85"></stop>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"></stop>
    </linearGradient>
    <filter id="glow" x="-30%" y="-60%" width="160%" height="220%">
      <feGaussianBlur stdDeviation="4.5" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <clipPath id="hclip"><rect width="1200" height="330"></rect></clipPath>
  </defs>
  <rect width="1200" height="330" fill="url(#bg)"></rect>
  <rect width="1200" height="330" fill="url(#aura)"></rect>
  <g opacity="0.85">
    <path d="M0,205 L150,120 L240,165 L360,95 L470,168 L560,110 L680,175 L790,120 L920,180 L1050,130 L1160,185 L1200,160 L1200,330 L0,330 Z" fill="#161b22" opacity="0.7"></path>
    <path d="M0,240 L120,175 L250,225 L360,160 L500,235 L640,165 L780,240 L900,180 L1040,245 L1160,190 L1200,225 L1200,330 L0,330 Z" fill="#21262d"></path>
    <path d="M360,95 L400,120 L378,135 L415,158 L470,168" fill="none" stroke="#8b949e" stroke-width="2" opacity="0.4"></path>
  </g>
  <g text-anchor="middle" font-family="'Segoe UI', Verdana, Geneva, sans-serif">
    <text x="600" y="146" font-size="52" font-weight="700" letter-spacing="2" fill="url(#gold)" filter="url(#glow)">Mimoun Baltit Khadiri</text>
    <rect x="440" y="168" width="320" height="2.5" rx="1.25" fill="#E0B84C" opacity="0.6"></rect>
    <text x="600" y="204" font-size="19" letter-spacing="4" fill="#D8C3A5">FULL STACK DEVELOPER · IA &amp; LLM</text>
  </g>
  <g clip-path="url(#hclip)">
    <rect x="-200" y="0" width="150" height="330" fill="url(#shine)" opacity="0.5" transform="skewX(-18)">
      <animate attributeName="x" from="-260" to="1360" dur="7s" begin="1.5s" repeatCount="indefinite"></animate>
    </rect>
  </g>
  <rect x="0" y="326" width="1200" height="4" fill="#238636" opacity="0.85"></rect>
</svg>
