<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" width="1200" height="260" role="img" aria-label="Mimoun Baltit - Full Stack Developer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#122E22"></stop>
      <stop offset="0.55" stop-color="#0A1410"></stop>
      <stop offset="1" stop-color="#08120D"></stop>
    </linearGradient>
    <radialGradient id="aura" cx="50%" cy="8%" r="70%">
      <stop offset="0" stop-color="#2D6A4F" stop-opacity="0.45"></stop>
      <stop offset="0.55" stop-color="#122E22" stop-opacity="0.18"></stop>
      <stop offset="1" stop-color="#0A1410" stop-opacity="0"></stop>
    </radialGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f7f5"></stop>
      <stop offset="0.5" stop-color="#c9d4ce"></stop>
      <stop offset="1" stop-color="#8fa39a"></stop>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F3D27A"></stop>
      <stop offset="0.5" stop-color="#E0B84C"></stop>
      <stop offset="1" stop-color="#A9781A"></stop>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"></stop>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="1"></stop>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"></stop>
    </linearGradient>
    <filter id="glow" x="-30%" y="-60%" width="160%" height="220%">
      <feGaussianBlur stdDeviation="4.5" result="b"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="b"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
    <symbol id="katana" overflow="visible">
      <rect x="0" y="-4.5" width="70" height="9" rx="3.5" fill="#241708"></rect>
      <g stroke="#08120D" stroke-width="1.3" opacity="0.55">
        <line x1="6" y1="-4.5" x2="12" y2="4.5"></line>
        <line x1="16" y1="-4.5" x2="22" y2="4.5"></line>
        <line x1="26" y1="-4.5" x2="32" y2="4.5"></line>
        <line x1="36" y1="-4.5" x2="42" y2="4.5"></line>
        <line x1="46" y1="-4.5" x2="52" y2="4.5"></line>
        <line x1="56" y1="-4.5" x2="62" y2="4.5"></line>
      </g>
      <ellipse cx="74" cy="0" rx="4.5" ry="13" fill="url(#gold)"></ellipse>
      <path d="M80,-5 L300,-4 L330,0 L300,4 L80,5 Z" fill="url(#steel)"></path>
      <path d="M84,-1.3 L300,-1.1" stroke="#ffffff" stroke-width="0.9" opacity="0.55"></path>
    </symbol>
  </defs>
  <rect width="1200" height="260" fill="url(#bg)"></rect>
  <rect width="1200" height="260" fill="url(#aura)"></rect>
  <g opacity="0.42">
    <g transform="translate(600,140) scale(0.66)">
      <g transform="translate(-165,0)"><use href="#katana"></use></g>
      <g transform="rotate(-30) translate(-165,0)"><use href="#katana"></use></g>
      <g transform="scale(-1,1)"><g transform="rotate(-30) translate(-165,0)"><use href="#katana"></use></g></g>
    </g>
  </g>
  <g>
    <circle cx="230" cy="240" r="2.6" fill="#52B788"></circle>
    <circle cx="360" cy="240" r="1.8" fill="#74C69D"></circle>
    <circle cx="850" cy="240" r="2.2" fill="#E0B84C"></circle>
    <circle cx="960" cy="240" r="1.6" fill="#52B788"></circle>
    <circle cx="1030" cy="240" r="2.3" fill="#74C69D"></circle>
    <circle cx="150" cy="240" r="1.7" fill="#E0B84C"></circle>
  </g>
  <ellipse cx="600" cy="122" rx="360" ry="70" fill="#08120D" opacity="0.30"></ellipse>
  <g text-anchor="middle" font-family="&#39;Segoe UI&#39;, Verdana, Geneva, sans-serif">
    <text x="600" y="128" font-size="62" font-weight="700" letter-spacing="3" fill="url(#gold)" filter="url(#glow)">
      Mimoun Baltit
      
    </text>
    <rect x="450" y="150" width="300" height="2.5" rx="1.25" fill="#E0B84C" opacity="0.6"></rect>
    <text x="600" y="186" font-size="21" letter-spacing="4" fill="#D8C3A5">
      FULL STACK DEVELOPER · IA &amp; LLM
      
    </text>
  </g>
  <rect x="-260" y="0" width="150" height="260" fill="url(#shine)" opacity="0.0" transform="skewX(-18)">
    
    
  </rect>
  <rect x="0" y="256" width="1200" height="4" fill="url(#gold)" opacity="0.85"></rect>
</svg>